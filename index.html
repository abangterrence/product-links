<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrence's Pick</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: #ff6600;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.search-box {
    width: 90%;
    margin: 15px auto;
    display: block;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.container {
    width: 95%;
    margin: auto;
}

.card {
    background: white;
    margin: 15px 0;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: none;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.product-name {
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    display: block;
    text-align: center;
    background: #ff6600;
    color: white;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Terrence's Pick</div>

<input type="text" class="search-box" id="search" placeholder="Search product code (e.g. MT001)">

<div class="container">

    <div class="card" data-keywords="MT001 oxy milk thistle milk thistle liver">
    <img src="https://placehold.co/500x300/orange/white?text=Oxy+Milk+Thistle">
    <div class="product-name">Oxy Milk Thistle</div>
    <div class="code">Code: MT001</div>

    <a class="btn" href="https://s.shopee.com.my/2g9BO2MSal" target="_blank">
        View on Shopee
    </a>
</div>

    <div class="card" data-keywords="water filter penapis air">
        <img src="https://placehold.co/500x300/0077ff/white?text=Water+Filter">
        <div class="product-name">Water Filter</div>
        <a class="btn" href="https://shopee.com.my/" target="_blank">View on Shopee</a>
    </div>

</div>

<script>
const search = document.getElementById('search');
const cards = document.querySelectorAll('.card');

search.addEventListener('input', function() {
    let value = this.value.toLowerCase();

    cards.forEach(card => {
        let keywords = card.getAttribute('data-keywords');
        if (keywords.includes(value) && value !== "") {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</body>
</html>
