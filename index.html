<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrence's Pick</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#ff6600;
    color:white;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.search-box{
    width:90%;
    max-width:600px;
    margin:20px auto;
    display:block;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    margin:20px 0;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    display:none;
}

.product-layout{
    display:flex;
    align-items:center;
    gap:30px;
}

.product-layout img{
    width:300px;
    border-radius:10px;
    flex-shrink:0;
}

.product-info{
    flex:1;
}

.product-name{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.code{
    color:#666;
    margin-bottom:25px;
    font-size:16px;
}

.btn{
    display:inline-block;
    background:#ff6600;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:8px;
    font-weight:bold;
    font-size:16px;
}

.btn:hover{
    background:#e65c00;
}

@media (max-width:768px){

.product-layout{
    flex-direction:column;
    text-align:center;
}

.product-layout img{
    width:100%;
    max-width:320px;
}

.btn{
    width:100%;
    box-sizing:border-box;
}

}
</style>
</head>

<body>

<div class="header">Terrence's Pick</div>

<input type="text" class="search-box" id="search" placeholder="Type MT001 to find product">

<div class="container">

<div class="card" data-keywords="MT001 oxy milk thistle milk thistle liver silymarin">

<div class="product-layout">

<img src="mt001.jpg" alt="Oxy Milk Thistle">

<div class="product-info">

<div class="product-name">
Oxy Milk Thistle
</div>

<div class="code">
Code: MT001
</div>

<a class="btn" href="https://s.shopee.com.my/2g9BO2MSal" target="_blank">
🛒 View on Shopee
</a>

</div>

</div>

</div>

</div>

<script>
const search=document.getElementById('search');
const cards=document.querySelectorAll('.card');

search.addEventListener('input',function(){

let value=this.value.toLowerCase().trim();

cards.forEach(card=>{

let keywords=card.getAttribute('data-keywords').toLowerCase();

if(value===""){
card.style.display="none";
}
else if(keywords.includes(value)){
card.style.display="block";
}
else{
card.style.display="none";
}

});

});
</script>

</body>
</html>
